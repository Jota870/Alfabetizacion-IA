<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Literacy - Aprende Inteligencia Artificial</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-brain nav-icon"></i> AI Master</h2>
            </div>
            <ul class="nav-links" id="nav-menu">
                <!-- Links will be injected by JS -->
            </ul>
            <div class="sidebar-footer">
                <p>v1.0.0 • AI Skills Edu</p>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" id="menu-toggle">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="progress-container">
                    <span id="progress-text">Progreso: 0%</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
            </header>

            <!-- Dynamic Content Container -->
            <div id="content-area" class="content-area">
                <!-- Content injected here via JS -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
